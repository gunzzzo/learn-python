<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Python - Interactive Coding Platform</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 90vh;
        }

        .sidebar {
            background: #1e293b;
            color: white;
            padding: 30px;
            overflow-y: auto;
        }

        .main-content {
            padding: 30px;
            background: #f8fafc;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #667eea;
        }

        .lesson-list h3 {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .lesson-item {
            padding: 12px;
            margin: 8px 0;
            background: #334155;
            border-left: 3px solid transparent;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .lesson-item:hover {
            background: #475569;
            border-left-color: #667eea;
        }

        .lesson-item.active {
            background: #667eea;
            border-left-color: #667eea;
        }

        .lesson-title {
            font-weight: 600;
            margin-bottom: 30px;
            color: #1e293b;
            font-size: 24px;
        }

        .lesson-content {
            margin-bottom: 30px;
        }

        .lesson-content h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .lesson-content h3 {
            color: #1e293b;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .lesson-content p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .code-example {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .editor-section {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .editor-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
            display: block;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            background: white;
            color: #1e293b;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-run {
            background: #667eea;
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .btn-run:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-run:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #e2e8f0;
            color: #1e293b;
            flex: 1;
            min-width: 120px;
        }

        .btn-reset:hover {
            background: #cbd5e1;
        }

        .btn-example {
            background: #10b981;
            color: white;
            flex: 1;
            min-width: 120px;
            font-size: 12px;
        }

        .btn-example:hover {
            background: #059669;
        }

        .output {
            margin-top: 15px;
            padding: 15px;
            background: #1e293b;
            color: #10b981;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 40px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output.active {
            display: block;
        }

        .output-error {
            color: #ef4444;
        }

        .hint {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            color: #1e40af;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }

        .example-card {
            background: #f0fdf4;
            border: 2px solid #86efac;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .example-card:hover {
            background: #dcfce7;
            border-color: #4ade80;
            transform: translateY(-2px);
        }

        .example-card-title {
            font-weight: 600;
            color: #166534;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .example-card-desc {
            font-size: 12px;
            color: #3f6212;
        }

        .progress {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s ease;
        }

        ul, ol {
            margin-left: 20px;
            margin-bottom: 15px;
            color: #475569;
        }

        li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: 300px;
                border-bottom: 2px solid #334155;
            }

            .examples-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar with lessons -->
        <div class="sidebar">
            <div class="logo">🐍 Learn Python</div>

            <div class="lesson-list">
                <h3>Basics</h3>
                <div class="lesson-item active" onclick="loadLesson(0)">1. Variables & Types</div>
                <div class="lesson-item" onclick="loadLesson(1)">2. String Operations</div>
                <div class="lesson-item" onclick="loadLesson(2)">3. Lists & Loops</div>
                <div class="lesson-item" onclick="loadLesson(3)">4. Conditionals</div>

                <h3>Intermediate</h3>
                <div class="lesson-item" onclick="loadLesson(4)">5. Functions</div>
                <div class="lesson-item" onclick="loadLesson(5)">6. Dictionaries</div>
                <div class="lesson-item" onclick="loadLesson(6)">7. List Comprehensions</div>

                <h3>Best Practices</h3>
                <div class="lesson-item" onclick="loadLesson(7)">8. Error Handling</div>
                <div class="lesson-item" onclick="loadLesson(8)">9. Code Style</div>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <div class="lesson-title" id="lessonTitle">Variables & Types</div>
            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 11%;"></div>
            </div>

            <div id="lessonBody"></div>

            <div class="editor-section">
                <label class="editor-label">💻 Try it yourself - Pick an example or write your own:</label>
                <div id="examplesContainer"></div>
                <textarea id="codeEditor" placeholder="Write your Python code here..."></textarea>
                <div class="button-group">
                    <button class="btn-run" id="runBtn" onclick="runCode()">▶ Run Code</button>
                    <button class="btn-reset" onclick="resetCode()">↺ Reset</button>
                </div>
                <div class="output" id="output"></div>
            </div>
        </div>
    </div>

    <script>
        let pyodide;
        let pyodideReady = false;

        async function initPyodide() {
            pyodide = await loadPyodide();
            pyodideReady = true;
            document.getElementById('runBtn').disabled = false;
        }

        initPyodide();

        const lessons = [
            {
                title: "Variables & Types",
                content: `
                    <h2>What are Variables?</h2>
                    <p>Variables are containers that store data values. Think of them like labeled boxes - you put something in the box and give it a name so you can find it later!</p>

                    <h3>📝 Basic Example:</h3>
                    <div class="code-example">
name = "Alice"
age = 25
height = 5.6

print(name)
print(age)
print(height)
                    </div>

                    <h2>Data Types</h2>
                    <p>Different kinds of data Python can store:</p>
                    <ul>
                        <li><strong>String:</strong> Text inside quotes (like "Hello")</li>
                        <li><strong>Integer:</strong> Whole numbers (like 25)</li>
                        <li><strong>Float:</strong> Decimal numbers (like 5.6)</li>
                        <li><strong>Boolean:</strong> True or False</li>
                    </ul>

                    <div class="hint">
                        <strong>💡 Tip:</strong> Use descriptive names like <code>user_age</code> instead of just <code>x</code>
                    </div>

                    <h2>Math with Variables</h2>
                    <div class="code-example">
x = 10
y = 5

print(x + y)      # Addition: 15
print(x - y)      # Subtraction: 5
print(x * y)      # Multiplication: 50
print(x / y)      # Division: 2.0
                    </div>
                `,
                examples: [
                    { title: "Simple Variables", desc: "Create and print variables", code: `name = "Your Name"\nage = 25\nprint(name)\nprint(age)` },
                    { title: "Math", desc: "Do basic math", code: `x = 10\ny = 3\nprint(x + y)\nprint(x * y)` },
                    { title: "All Data Types", desc: "See different types", code: `text = "Python"\nnumber = 42\ndecimal = 3.14\ntruth = True\nprint(text, number, decimal, truth)` }
                ],
                defaultCode: `# Create variables
name = "Your Name"
age = 25

# Print them
print(name)
print(age)`
            },
            {
                title: "String Operations",
                content: `
                    <h2>Working with Strings (Text)</h2>
                    <p>Strings are text. You can do lots of things with them!</p>

                    <h3>📝 Basic String Operations:</h3>
                    <div class="code-example">
text = "Hello Python"

print(len(text))           # Get length (how many characters)
print(text.upper())        # Make uppercase
print(text.lower())        # Make lowercase
print(text.replace("Python", "World"))  # Replace text
                    </div>

                    <h2>Putting Values Inside Strings (F-strings)</h2>
                    <p>This is super useful! You can mix text and variables:</p>

                    <div class="code-example">
name = "Bob"
age = 30

message = f"{name} is {age} years old"
print(message)
                    </div>

                    <div class="hint">
                        <strong>🔥 Most Useful:</strong> F-strings are the best way to create messages with variables (Python 3.6+)
                    </div>
                `,
                examples: [
                    { title: "Text Case", desc: "Change text to upper/lower", code: `text = "python"\nprint(text.upper())\nprint(text.lower())\nprint(text.capitalize())` },
                    { title: "F-strings", desc: "Mix text with variables", code: `name = "Alice"\nage = 25\nprint(f"{name} is {age}")` },
                    { title: "String Length", desc: "Count characters", code: `word = "Python"\nprint(len(word))` }
                ],
                defaultCode: `# String operations
text = "python programming"

print(text.upper())
print(text.capitalize())

# F-strings
name = "Developer"
level = 5
print(f"{name} is at level {level}")`
            },
            {
                title: "Lists & Loops",
                content: `
                    <h2>Lists - Store Multiple Items</h2>
                    <p>Lists let you store multiple items in one variable:</p>

                    <h3>📝 Creating Lists:</h3>
                    <div class="code-example">
fruits = ["apple", "banana", "orange"]

print(fruits[0])    # First item (index 0)
print(fruits[1])    # Second item
print(fruits[-1])   # Last item
                    </div>

                    <h2>Loops - Do Something Multiple Times</h2>
                    <p>Loop through each item in a list:</p>

                    <div class="code-example">
fruits = ["apple", "banana", "orange"]

for fruit in fruits:
    print(f"I like {fruit}")
                    </div>

                    <h2>Loop with Numbers</h2>
                    <div class="code-example">
for i in range(5):
    print(i)
                    </div>

                    <div class="hint">
                        <strong>💡 Remember:</strong> <code>range(5)</code> gives you: 0, 1, 2, 3, 4 (starts at 0, stops before 5)
                    </div>
                `,
                examples: [
                    { title: "List Basics", desc: "Create and access items", code: `fruits = ["apple", "banana", "cherry"]\nprint(fruits[0])\nprint(fruits[1])\nprint(fruits[-1])` },
                    { title: "Loop Through List", desc: "Print each item", code: `foods = ["pizza", "tacos", "sushi"]\nfor food in foods:\n    print(f"I like {food}")` },
                    { title: "Loop with Range", desc: "Count from 0 to 4", code: `for i in range(5):\n    print(i)` }
                ],
                defaultCode: `# Lists and loops
fruits = ["apple", "banana", "cherry"]

# Print each fruit
for fruit in fruits:
    print(f"Fruit: {fruit}")`
            },
            {
                title: "Conditionals",
                content: `
                    <h2>If Statements - Make Decisions</h2>
                    <p>Let your program make decisions based on conditions:</p>

                    <h3>📝 Basic If Statement:</h3>
                    <div class="code-example">
age = 20

if age >= 18:
    print("You are an adult")
else:
    print("You are not yet an adult")
                    </div>

                    <h2>If, Elif, Else (Multiple Options)</h2>
                    <div class="code-example">
score = 85

if score >= 90:
    print("Grade: A")
elif score >= 80:
    print("Grade: B")
elif score >= 70:
    print("Grade: C")
else:
    print("Grade: F")
                    </div>

                    <h2>Comparison Operators</h2>
                    <ul>
                        <li><code>==</code> equal to</li>
                        <li><code>!=</code> not equal to</li>
                        <li><code>&lt;</code> less than</li>
                        <li><code>&gt;</code> greater than</li>
                        <li><code>&lt;=</code> less than or equal</li>
                        <li><code>&gt;=</code> greater than or equal</li>
                    </ul>

                    <div class="hint">
                        <strong>⚠️ Important:</strong> Use <code>==</code> to compare, not <code>=</code> (that's for assigning)
                    </div>
                `,
                examples: [
                    { title: "Simple If", desc: "Check a condition", code: `age = 20\nif age >= 18:\n    print("Adult")\nelse:\n    print("Not adult")` },
                    { title: "If/Elif/Else", desc: "Multiple options", code: `score = 85\nif score >= 90:\n    print("A")\nelif score >= 80:\n    print("B")\nelse:\n    print("C")` },
                    { title: "Check Equality", desc: "See if things are equal", code: `name = "Alice"\nif name == "Alice":\n    print("Found Alice!")\nelse:\n    print("Not Alice")` }
                ],
                defaultCode: `# Conditionals
score = 85

if score >= 90:
    print("Grade: A")
elif score >= 80:
    print("Grade: B")
else:
    print("Grade: F")`
            },
            {
                title: "Functions",
                content: `
                    <h2>Functions - Reusable Code Blocks</h2>
                    <p>Functions let you write code once and use it many times:</p>

                    <h3>📝 Simple Function:</h3>
                    <div class="code-example">
def greet(name):
    print(f"Hello, {name}!")

greet("Alice")
greet("Bob")
                    </div>

                    <h2>Functions that Return Values</h2>
                    <div class="code-example">
def add(a, b):
    return a + b

result = add(5, 3)
print(result)  # 8
                    </div>

                    <h2>Functions with Multiple Parameters</h2>
                    <div class="code-example">
def introduce(name, age, city):
    return f"{name} is {age} and lives in {city}"

print(introduce("Charlie", 30, "London"))
                    </div>

                    <div class="hint">
                        <strong>💡 Tip:</strong> Use <code>return</code> to send a result back
                    </div>
                `,
                examples: [
                    { title: "Simple Function", desc: "Function with print", code: `def greet(name):\n    print(f"Hello {name}!")\n\ngreet("Alice")\ngreet("Bob")` },
                    { title: "Return Value", desc: "Function returns result", code: `def add(a, b):\n    return a + b\n\nresult = add(5, 3)\nprint(result)` },
                    { title: "Multiple Params", desc: "Function with many inputs", code: `def multiply(x, y, z):\n    return x * y * z\n\nprint(multiply(2, 3, 4))` }
                ],
                defaultCode: `# Functions
def calculate_area(length, width):
    return length * width

# Use it
area = calculate_area(5, 3)
print(f"Area: {area}")`
            },
            {
                title: "Dictionaries",
                content: `
                    <h2>Dictionaries - Store Key-Value Pairs</h2>
                    <p>Dictionaries are like real dictionaries - you look up a key and get a value!</p>

                    <h3>📝 Creating a Dictionary:</h3>
                    <div class="code-example">
person = {
    "name": "Alice",
    "age": 25,
    "city": "New York"
}

print(person["name"])   # Get value by key
print(person["age"])
                    </div>

                    <h2>Modifying Dictionaries</h2>
                    <div class="code-example">
person = {"name": "Bob", "age": 30}

# Add new key-value
person["email"] = "bob@email.com"

# Update value
person["age"] = 31

# Print everything
print(person)
                    </div>

                    <h2>Loop Through Dictionary</h2>
                    <div class="code-example">
person = {"name": "Charlie", "age": 28, "city": "London"}

for key, value in person.items():
    print(f"{key}: {value}")
                    </div>

                    <div class="hint">
                        <strong>💡 Use:</strong> Dictionaries when data has labels (keys)
                    </div>
                `,
                examples: [
                    { title: "Create Dictionary", desc: "Store labeled data", code: `person = {"name": "Alice", "age": 25}\nprint(person["name"])\nprint(person["age"])` },
                    { title: "Add/Update", desc: "Modify dictionary", code: `person = {"name": "Bob"}\nperson["age"] = 30\nperson["city"] = "NYC"\nprint(person)` },
                    { title: "Loop Dictionary", desc: "Print each key-value", code: `info = {"name": "Alice", "job": "Developer"}\nfor key, value in info.items():\n    print(f"{key}: {value}")` }
                ],
                defaultCode: `# Dictionary
student = {
    "name": "John",
    "age": 20,
    "grade": "A"
}

print(f"Name: {student['name']}")
print(f"Age: {student['age']}")
print(f"Grade: {student['grade']}")`
            },
            {
                title: "List Comprehensions",
                content: `
                    <h2>List Comprehensions - Create Lists Easily</h2>
                    <p>A fast way to create lists:</p>

                    <h3>📝 Basic Example:</h3>
                    <div class="code-example">
# Old way (long)
squares = []
for x in range(5):
    squares.append(x * x)

# New way (short!) - List comprehension
squares = [x * x for x in range(5)]
print(squares)
                    </div>

                    <h2>With Conditions</h2>
                    <div class="code-example">
# Get only even numbers
evens = [x for x in range(20) if x % 2 == 0]
print(evens)

# Uppercase words
words = ["python", "is", "awesome"]
upper = [w.upper() for w in words]
print(upper)
                    </div>

                    <div class="hint">
                        <strong>⚡ Faster:</strong> List comprehensions are faster and cleaner than loops
                    </div>
                `,
                examples: [
                    { title: "Double Numbers", desc: "Multiply each number", code: `numbers = [x * 2 for x in range(1, 6)]\nprint(numbers)` },
                    { title: "Even Numbers", desc: "Filter even only", code: `evens = [x for x in range(20) if x % 2 == 0]\nprint(evens)` },
                    { title: "Uppercase", desc: "Change text case", code: `words = ["python", "is", "fun"]\nupper = [w.upper() for w in words]\nprint(upper)` }
                ],
                defaultCode: `# List comprehensions
# Squares of 1-10
squares = [x**2 for x in range(1, 11)]
print(f"Squares: {squares}")

# Even numbers
evens = [x for x in range(20) if x % 2 == 0]
print(f"Evens: {evens}")`
            },
            {
                title: "Error Handling",
                content: `
                    <h2>Try-Except - Handle Errors</h2>
                    <p>Catch errors so your program doesn't crash:</p>

                    <h3>📝 Basic Error Handling:</h3>
                    <div class="code-example">
try:
    number = int("abc")  # This will error!
    print(number)
except ValueError:
    print("That's not a valid number!")
                    </div>

                    <h2>Multiple Error Types</h2>
                    <div class="code-example">
try:
    numbers = [1, 2, 3]
    print(numbers[10])  # Error: index too high
except IndexError:
    print("That index doesn't exist!")
except Exception as e:
    print(f"Error: {e}")
                    </div>

                    <h2>Finally - Always Run This</h2>
                    <div class="code-example">
try:
    result = 10 / 2
    print(result)
except ZeroDivisionError:
    print("Can't divide by zero!")
finally:
    print("Done!")  # Always prints
                    </div>

                    <div class="hint">
                        <strong>✅ Best Practice:</strong> Catch specific errors, not all with bare <code>except:</code>
                    </div>
                `,
                examples: [
                    { title: "Number Error", desc: "Handle invalid number", code: `try:\n    x = int("hello")\nexcept ValueError:\n    print("Not a number!")` },
                    { title: "Index Error", desc: "Handle list index error", code: `try:\n    list = [1, 2, 3]\n    print(list[10])\nexcept IndexError:\n    print("Index too high!")` },
                    { title: "Division Error", desc: "Handle divide by zero", code: `try:\n    result = 10 / 0\nexcept ZeroDivisionError:\n    print("Can't divide by zero!")` }
                ],
                defaultCode: `# Error handling
try:
    num1 = 10
    num2 = 5
    result = num1 / num2
    print(f"Result: {result}")
except ZeroDivisionError:
    print("Cannot divide by zero!")
finally:
    print("Calculation complete")`
            },
            {
                title: "Code Style & Best Practices",
                content: `
                    <h2>PEP 8 - How to Write Clean Python</h2>
                    <p>PEP 8 is Python's style guide. It helps make code readable!</p>

                    <h3>📝 Naming Rules:</h3>
                    <div class="code-example">
# ✅ GOOD - easy to understand
user_age = 25
is_active = True
MAX_ATTEMPTS = 3

        let currentLesson = 0;

        function loadLesson(index) {
            currentLesson = index;
            
            // Update sidebar highlight
            document.querySelectorAll('.lesson-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            const lesson = lessons[index];
            document.getElementById('lessonTitle').textContent = lesson.title;
            document.getElementById('lessonBody').innerHTML = lesson.content;
            document.getElementById('codeEditor').value = lesson.defaultCode;
            document.getElementById('output').classList.remove('active');
            
            // Load example buttons
            const examplesContainer = document.getElementById('examplesContainer');
            if (lesson.examples && lesson.examples.length > 0) {
                let html = '<div class="examples-grid">';
                lesson.examples.forEach((example, i) => {
                    html += `
                        <div class="example-card" onclick="loadExample(${index}, ${i})">
                            <div class="example-card-title">📌 ${example.title}</div>
                            <div class="example-card-desc">${example.desc}</div>
                        </div>
                    `;
                });
                html += '</div>';
                examplesContainer.innerHTML = html;
            }
            
            // Update progress bar
            const progress = ((index + 1) / lessons.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function loadExample(lessonIndex, exampleIndex) {
            const example = lessons[lessonIndex].examples[exampleIndex];
            document.getElementById('codeEditor').value = example.code;
            document.getElementById('output').classList.remove('active');
        }

        async function runCode() {
            if (!pyodideReady) {
                document.getElementById('output').innerHTML = '<span class="output-error">⏳ Loading Python... please wait a moment</span>';
                document.getElementById('output').classList.add('active');
                return;
            }

            const code = document.getElementById('codeEditor').value;
            const output = document.getElementById('output');
            
            if (!code.trim()) {
                output.innerHTML = '<span class="output-error">❌ Please write some code first!</span>';
                output.classList.add('active');
                return;
            }

            try {
                document.getElementById('runBtn').disabled = true;
                output.innerHTML = '⏳ Running...';
                output.classList.add('active');

                const result = await pyodide.runPythonAsync(code);
                
                output.innerHTML = result || '✓ Code executed successfully!';
                document.getElementById('runBtn').disabled = false;
            } catch (error) {
                output.innerHTML = `<span class="output-error">❌ Error:\n${error.message}</span>`;
                document.getElementById('runBtn').disabled = false;
            }
        }

        function resetCode() {
            const lesson = lessons[currentLesson];
            document.getElementById('codeEditor').value = lesson.defaultCode;
            document.getElementById('output').classList.remove('active');
        }

        // Load first lesson on page load
        loadLesson(0);

        // Allow Ctrl+Enter to run code
        document.getElementById('codeEditor').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                runCode();
            }
        });
    </script>
